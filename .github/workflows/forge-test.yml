name: "Test a Forge project"

on:
  workflow_call:
    inputs:
      cache-path:
        default: |
          cache
          node_modules
          out
          out-optimized
        required: false
        type: "string"

      foundry-fuzz-runs:
        default: 1000
        required: false
        type: "number"

      foundry-invariant-depth:
        default: 20
        required: false
        type: "number"

      foundry-invariant-runs:
        default: 20
        required: false
        type: "number"

      foundry-profile:
        default: "default"
        required: false
        type: "string"

      fuzz-seed:
        default: false
        required: false
        type: "boolean"

      match-path:
        required: true
        type: "string"

      name:
        default: "Forge tests"
        required: false
        type: "string"

    secrets:
      API_KEY_BUILDBEAR:
        required: false
      API_KEY_INFURA:
        required: false
      MAINNET_RPC_URL:
        required: false

jobs:
  forge-test:
    env:
      API_KEY: "431b7c55-a656-46cb-aef0-2013163ea7c0"
      API_KEY_INFURA: ${{ secrets.API_KEY_INFURA }}
      FOUNDRY_INVARIANT_DEPTH: ${{ inputs.foundry-invariant-depth }}
      FOUNDRY_INVARIANT_RUNS: ${{ inputs.foundry-invariant-runs }}
      FOUNDRY_FUZZ_RUNS: ${{ inputs.foundry-fuzz-runs }}
      FOUNDRY_PROFILE: ${{ inputs.foundry-profile }}
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
      BUILDBEAR_BASE_URL: "https://api.dev.buildbear.io"
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Clone Foundry repository
        run: |
          if [ ! -d "foundry" ]; then
            git clone https://github.com/BuildBearLabs/foundry.git
          fi
        shell: bash

      - name: Set Foundry commit hash
        id: foundry_hash
        run: echo "hash=$(git -C foundry rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Restore Foundry build cache
        uses: actions/cache@v3
        id: cache-foundry
        with:
          path: |
            foundry/target
            $HOME/.config/.foundry/bin
          key: ${{ runner.os }}-foundry-build-${{ steps.foundry_hash.outputs.hash }}

      - name: Debug Forge binary and cache contents
        run: |
          echo "Checking for Forge binary at $HOME/.config/.foundry/bin/forge"
          ls -al $HOME/.config/.foundry/bin || echo "Bin folder not found"
          ls -al foundry/target || echo "Target folder not found"

      - name: Build Foundry from source (if not cached)
        run: |
          FOUNDRY_BIN="$HOME/.config/.foundry/bin/forge"
          if [ ! -f "$FOUNDRY_BIN" ]; then
            echo "Forge binary not found, building Foundry..."
            cd foundry
            cargo build
            mkdir -p "$(dirname "$FOUNDRY_BIN")"
            cp target/debug/forge "$FOUNDRY_BIN"
          else
            echo "Forge binary found in cache, skipping build."
          fi
          echo "$(dirname "$FOUNDRY_BIN")" >> $GITHUB_PATH

      - name: Save Foundry build cache
        if: steps.cache-foundry.outputs.cache-hit != 'true'
        uses: actions/cache/save@v3
        with:
          path: |
            foundry/target
            $HOME/.config/.foundry/bin
          key: ${{ runner.os }}-foundry-build-${{ steps.foundry_hash.outputs.hash }}

      - name: Show Forge version
        run: |
          forge --version

      - name: "Restore the cached build"
        uses: "itsshantanu/gha-utils/.github/actions/evm-cache@main"
        with:
          cache-path: ${{ inputs.cache-path }}
          fail-on-cache-miss: true

      - name: "Generate fuzz seed that changes weekly to avoid burning through RPC allowance"
        if: ${{ inputs.fuzz-seed }}
        run: |
          seed=$(echo $(($EPOCHSECONDS / 604800)))
          echo "FOUNDRY_FUZZ_SEED=$seed" >> $GITHUB_ENV

      - name: Make bbOut dir
        run: mkdir bbOut
        shell: bash

      - name: "Run the tests"
        run: forge test --match-path "${{ inputs.match-path }}"

      - name: "Run BB Action CI"
        uses: BuildBearLabs/buildbear_x_action@feat/modify-payload-with-new-api
        with:
          # network: |
          #   [
          #     {
          #       "chainId": 1
          #     }
          #   ]
          # deploy-command: "make deploy"
          buildbear-token: "431b7c55-a656-46cb-aef0-2013163ea7c0"

      - name: "Add summary"
        run: |
          echo "## Result for ${{ inputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Passed" >> $GITHUB_STEP_SUMMAR
